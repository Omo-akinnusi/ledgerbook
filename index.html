    <!-- Google Analytics 4 -->
    <!-- Replace G-XXXXXXXXXX with your Measurement ID from Google Analytics -->
    <!-- Get it at: https://analytics.google.com → Admin → Data Streams → your stream -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX', {
        // Don't send page_view automatically — React handles routing
        send_page_view: false,
      });

      // Global analytics helper — called from app code
      window.trackEvent = function(eventName, params) {
        if (typeof gtag === 'function') {
          gtag('event', eventName, params || {});
        }
      };

      window.trackPage = function(pageName) {
        if (typeof gtag === 'function') {
          gtag('event', 'page_view', {
            page_title: pageName,
            page_location: window.location.href,
          });
        }
      };
    </script>

    <!-- Google AdSense — replace ca-pub-XXXXXXXXXXXXXXXX with your real publisher ID -->

      crossorigin="anonymous"></script>
